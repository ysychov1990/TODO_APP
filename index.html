<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>TODO APP</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="css/mainpage.css" />
	</head>
	<body>
		<header>
			<h1>MyTask</h1>
			<h2>Organize your workflow smarter</h2>
		</header>
		<main>
			<div class="wrapper">
				<!-- <div class="search-bar">
					<input
						type="text"
						class="search-bar__input inter-normal"
						placeholder="Search for tasks"
					/>
				</div> -->
				<div class="task-selectors">
					<div class="task-selectors__box">
						<div class="task-selector__item">
							<div
								class="task-selector__item__button task-selector__item__button__important"
							>
								<div class="task-selector__item__button__switch"></div>
							</div>
							<p class="task-selector__item__description inter-normal">
								Important
							</p>
						</div>
						<div class="task-selector__item">
							<div
								class="task-selector__item__button task-selector__item__button__active"
							>
								<div class="task-selector__item__button__switch"></div>
							</div>
							<p class="task-selector__item__description inter-normal">
								Active
							</p>
						</div>
						<div class="task-selector__item">
							<div
								class="task-selector__item__button task-selector__item__button__completed"
							>
								<div class="task-selector__item__button__switch"></div>
							</div>
							<p class="task-selector__item__description inter-normal">
								Completed
							</p>
						</div>
					</div>
				</div>
				<div class="tasks-list">
					<!-- ** Here tasks would be inserted ** -->
				</div>
				<p class="selected-tasks-counter inter-normal"></p>
				<div class="task-managment-panels">
					<div class="task-managment-panel task-managment-panel__main">
						<button class="task-manager add-task">
							<img src="img/plus-square.svg" alt="Ikona plusa" />
						</button>
						<button class="task-manager mark-as-completed">
							<img src="img/check-square.svg" alt="Ikona plusa" />
						</button>
						<button class="task-manager remove-task">
							<img src="img/minus-square.svg" alt="Ikona minusa" />
						</button>
						<button class="task-manager edit-task">
							<img src="img/edit.svg" alt="Ikona edycji" />
						</button>
					</div>

					<div class="task-managment-panel task-managment-panel__checking">
						<button class="task-manager select-all">
							<img
								src="img/select-all-to-check.svg"
								alt="Ikonka zaznaczenia wielu zadań"
							/>
						</button>
						<button class="task-manager check-tasks">
							<img src="img/check-save.svg" alt="Ikonka zapisu wyboru " />
						</button>
						<button class="task-manager exit">
							<img src="img/exit.svg" alt="Ikonka wyjścia" />
						</button>
					</div>

					<div class="task-managment-panel task-managment-panel__removing">
						<button class="task-manager select-all">
							<img
								src="img/select-all-for-removal.svg"
								alt="Ikonka zaznaczenia wielu zadań "
							/>
						</button>
						<button class="task-manager remove-tasks">
							<img src="img/trash-bin.svg" alt="Ikonka usunięcia zadań" />
						</button>
						<button class="task-manager exit">
							<img src="img/exit.svg" alt="Ikonka wyjścia" />
						</button>
					</div>

					<div class="task-managment-panel task-managment-panel__editing">
						<button class="task-manager start-editing">
							<img
								src="img/start-editing.svg"
								alt="Ikonka rozpoczęcia edycji"
							/>
						</button>
						<button class="task-manager exit">
							<img src="img/exit.svg" alt="Ikonka wyjścia" />
						</button>
					</div>
				</div>
			</div>
		</main>
		<div class="elipse"></div>
		<div class="shadow"></div>

		<div class="add-task__window">
			<div class="new-task">
				<div class="new-task__title">
					<label for="title" class="new-task__title__label inter-normal"
						>TASK TITLE</label
					>
					<input
						type="text"
						name="title"
						id="title"
						placeholder="Enter task title"
						class="new-task__title__input inter-normal"
					/>
				</div>
				<div class="new-task__metadata">
					<div class="new-task__metadata__deadline">
						<p class="new-task__metadata__deadline__p inter-normal">
							TASK DEADLINE
						</p>
						<input type="date" class="inter-normal" />
					</div>
					<div class="new-task__metadata__importance">
						<p class="new-task__metadata__importance__p inter-normal">
							IMPORTANT?
						</p>
						<div class="new-task__metadata__importance__checkbox">
							<img src="img/check.svg" alt="Ikonka zaznaczenia" />
						</div>
					</div>
				</div>

				<div class="new-task__description">
					<textarea
						class="new-task__description__textarea inter-normal"
						placeholder="Enter Task Description"
					></textarea>
				</div>
				<div class="new-task__buttons">
					<button
						class="new-task__buttons__button new-task__buttons__button__close"
					>
						<p class="button-label inter-normal">Close</p>
					</button>
					<button
						class="new-task__buttons__button new-task__buttons__button__insert"
					>
						<p class="button-label inter-normal">Add</p>
					</button>
				</div>
				<p class="new-task__state inter-normal">
					State: <span class="result inter-normal">Filling in information</span>
				</p>
			</div>
		</div>

		<div class="task-preview__window">
			<div class="task-preview">
				<p class="task-preview__title__label inter-normal">Title:</p>
				<h3 class="task-preview__title__value inter-bold"></h3>
				<p class="task-preview__deadline inter-normal">
					Deadline:
					<span class="task-preview__deadline__date inter-normal"></span>
				</p>
				<div class="task-preview__importance">
					<p class="task-preview__importance__label inter-normal">
						Importance:
						<span class="task-preview__importance__value inter-normal"></span>
					</p>
				</div>

				<p class="task-preview__description inter-normal">Description:</p>
				<p class="task-preview__description__value inter-normal"></p>
				<button class="task-preview__button inter-normal">Close</button>
			</div>
		</div>

		<div class="edit-task__window">
			<div class="edit-task">
				<div class="edit-task__title">
					<label for="edit-title" class="edit-task__title__label inter-normal"
						>Task title</label
					>
					<input
						type="text"
						id="edit-title"
						class="edit-task__title__input inter-normal"
					/>
				</div>
				<div class="edit-task__deadline">
					<label for="edit-date" class="edit-task__deadline__label inter-normal"
						>Deadline:</label
					>
					<input
						type="date"
						id="edit-date"
						class="edit-task__deadline__input inter-normal"
					/>
				</div>
				<div class="edit-task__importance">
					<p class="edit-task__importance__label inter-normal">IMPORTANT?</p>
					<div class="edit-task__importance__checkbox">
						<img
							src="img/check.svg"
							alt="Ikonka zaznaczenia"
							class="edit-task__importance__checkbox__icon"
						/>
					</div>
				</div>
				<div class="edit-task__description">
					<label
						for="edit-description"
						class="edit-task__description__label inter-normal"
						>Description:</label
					>
					<textarea
						id="edit-description"
						class="edit-task__description__textarea inter-normal"
					></textarea>
				</div>

				<div class="edit-task__buttons">
					<button class="edit-task__button cancel">Cancel</button>
					<button class="edit-task__button save-changes">Save changes</button>
				</div>
			</div>
		</div>

		<script type="module" src="JS/app.js"></script>
	</body>
</html>
